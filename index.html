<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Family Bills (Simple)</title>

<style>
body{
font-family:system-ui;
margin:16px;
max-width:900px;
}

.card{
border:1px solid #ddd;
border-radius:12px;
padding:14px;
margin:12px 0;
}

.row{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.field{
flex:1;
min-width:200px;
display:flex;
flex-direction:column;
gap:6px;
}

input{
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #bbb;
}

.big{
font-size:30px;
font-weight:800;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

button{
padding:12px 14px;
border-radius:10px;
border:1px solid #bbb;
background:#f6f6f6;
cursor:pointer;
}

.muted{
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<h2>Family Bills</h2>

<div class="card">

<div class="row">
<div class="field">
<label>Month</label>
<input id="month">
</div>

<div class="field">
<label>Split Count</label>
<input id="splitCount" type="number" value="3">
</div>
</div>

<div class="row">

<div class="field">
<label>AES Electric</label>
<input id="aes" type="number" step="0.01">
</div>

<div class="field">
<label>Citizens Energy</label>
<input id="citizens" type="number" step="0.01">
</div>

<div class="field">
<label>AT&T WiFi (shared)</label>
<input id="wifi" type="number" step="0.01">
</div>

<div class="field">
<label>AT&T Cellphone (his)</label>
<input id="phone" type="number" step="0.01">
</div>

</div>

<button id="copyLinkBtn">Copy Share Link</button>

<div class="muted">
Enter bills → send link to your son.
</div>

</div>

<div class="card">
<div class="muted">Total he owes</div>
<div class="big" id="total">$0.00</div>
</div>

<div class="card">

<table>
<thead>
<tr>
<th>Bill</th>
<th>Total</th>
<th>Rule</th>
<th>He Owes</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const $ = id => document.getElementById(id)

function money(n){
return "$"+Number(n).toFixed(2)
}

function num(v){
const n=Number(v)
return Number.isFinite(n)?n:0
}

function calc(){

const split=num($("splitCount").value)||1

const aes=num($("aes").value)
const citizens=num($("citizens").value)
const wifi=num($("wifi").value)
const phone=num($("phone").value)

const aesShare=aes/split
const citizensShare=citizens/split
const wifiShare=wifi/split
const phoneShare=phone

const total=aesShare+citizensShare+wifiShare+phoneShare

$("total").textContent=money(total)

$("table").innerHTML=`
<tr>
<td>AES</td>
<td>${money(aes)}</td>
<td>Split 1/${split}</td>
<td>${money(aesShare)}</td>
</tr>

<tr>
<td>Citizens</td>
<td>${money(citizens)}</td>
<td>Split 1/${split}</td>
<td>${money(citizensShare)}</td>
</tr>

<tr>
<td>AT&T WiFi</td>
<td>${money(wifi)}</td>
<td>Split 1/${split}</td>
<td>${money(wifiShare)}</td>
</tr>

<tr>
<td>AT&T Cellphone</td>
<td>${money(phone)}</td>
<td>Full</td>
<td>${money(phoneShare)}</td>
</tr>
`
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calc)
})

calc()

</script>

</body>
</html>
